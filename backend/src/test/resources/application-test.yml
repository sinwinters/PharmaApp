spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/pharma
    username: pharma
    password: pharma
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cache:
    type: none
  quartz:
    auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: test-secret-key-min-256-bits-required-for-hs256-algorithm-here
