spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pharma}
    username: ${POSTGRES_USER:pharma}
    password: ${POSTGRES_PASSWORD:pharma}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-secret}

server:
  servlet:
    context-path: /api/v1

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
